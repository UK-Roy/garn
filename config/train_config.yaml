# Training hyperparameters (matches paper Section IV-A-2)

training:
  n_episodes: 20000       # total training episodes
  test_interval: 1000     # test every N training episodes
  test_episodes: 500      # episodes per test run
  save_interval: 1000     # save checkpoint every N episodes
  log_interval: 50        # log to tensorboard + console every N episodes
  checkpoint_dir: checkpoints/
  log_dir: logs/

optimizer:
  type: adam
  lr: 0.0005
  weight_decay: 0.0

dqn:
  gamma: 0.9              # discount factor
  epsilon_start: 1.0      # initial exploration rate
  epsilon_end: 0.05       # final exploration rate
  epsilon_decay: 5000     # decay over this many episodes (was 10000, faster convergence)
  buffer_size: 50000      # replay buffer capacity
  batch_size: 64
  target_update: 200      # steps between target network updates
  min_buffer: 1000        # min transitions before training starts

# Reward weights (paper Section III-B)
reward:
  goal_reward: 1.0          # sparse terminal reward on reaching goal
  collision_penalty: -0.25  # terminal penalty on collision
  potential_weight: 1.0     # weight on potential-based goal shaping (dense, every step)
  discomfort_dist: 0.2      # proximity discomfort threshold (m)
  discomfort_penalty: -0.1  # per step inside discomfort zone
  c1: 0.05                  # group overtaking/following weight
  c2: 0.025                 # cooperative passing weight
  group_intrusion_penalty: -0.25  # per step inside group convex hull
  time_penalty: -0.001      # small per-step penalty to encourage efficiency

# Attention subnetwork pre-training
# Note: paper uses human gaze data; we use supervised pre-training with
# random attention targets as a proxy (or skip and train jointly).
pretrain:
  enabled: false
  epochs: 50
  lr: 0.001
